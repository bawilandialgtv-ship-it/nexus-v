<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>NEXUS-V | CORE OS v1.0</title>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root {
            --glow: #00f2ff;
            --bg: #020202;
            --panel: #0a0a0a;
            --border: #1a1a1a;
            --text: #00f2ff;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', 'Courier New', monospace;
            height: 100vh;
            overflow: hidden;
        }

        /* Tło z efektem siatki */
        body::before {
            content: "";
            position: absolute;
            width: 100%; height: 100%;
            background: linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
        }

        header {
            height: 60px;
            background: var(--panel);
            border-bottom: 2px solid var(--glow);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            z-index: 10;
        }

        .logo { font-size: 24px; letter-spacing: 8px; font-weight: bold; text-shadow: 0 0 10px var(--glow); }

        main {
            display: grid;
            grid-template-columns: 300px 1fr 250px;
            height: calc(100vh - 60px);
            gap: 10px;
            padding: 10px;
        }

        .window {
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid var(--border);
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .window-header {
            background: var(--border);
            padding: 5px 15px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            justify-content: space-between;
        }

        /* Odtwarzacz */
        #viewport {
            position: relative;
            background: #000;
            display: flex;
            flex-direction: column;
        }

        #player-container { flex: 1; position: relative; }
        #player { width: 100%; height: 100%; pointer-events: none; }

        /* Konsola sterowania */
        .controls {
            height: 50px;
            background: #000;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }

        .btn {
            cursor: pointer;
            padding: 5px 15px;
            border: 1px solid var(--glow);
            transition: 0.3s;
            font-size: 12px;
        }

        .btn:hover { background: var(--glow); color: #000; box-shadow: 0 0 10px var(--glow); }

        /* Lista i Logi */
        .list-area { flex: 1; overflow-y: auto; padding: 10px; }
        .entry {
            padding: 10px;
            border-bottom: 1px solid #111;
            font-size: 13px;
            cursor: pointer;
        }
        .entry:hover { background: rgba(0, 242, 255, 0.1); }

        #terminal {
            height: 150px;
            grid-column: 1 / 4;
            background: #000;
            font-family: monospace;
            font-size: 12px;
            padding: 10px;
            color: #00ff00;
            border: 1px solid #111;
            overflow-y: hidden;
        }

        input {
            background: #000;
            border: 1px solid var(--glow);
            color: var(--glow);
            padding: 10px;
            width: calc(100% - 22px);
            margin: 10px 0;
        }

        .status-dot { width: 10px; height: 10px; background: #00ff00; border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 5px #00ff00; }
    </style>
</head>
<body>

<header>
    <div class="logo">NEXUS-V</div>
    <div id="sys-clock">SYSTEM ONLINE | ADMIN: MACIEK</div>
</header>

<main>
    <section class="window">
        <div class="window-header"><span>Baza Danych</span><span>v1.0</span></div>
        <div class="list-area">
            <input type="text" id="vInput" placeholder="Wklej ID filmu...">
            <button class="btn" onclick="addNew()" style="width:100%">DODAJ DO SYSTEMU</button>
            <div id="vList">
                <div class="entry" onclick="playThis('dQw4w9WgXcQ')">> PROTOKÓŁ_INICJACJI</div>
            </div>
        </div>
    </section>

    <section class="window" style="grid-column: 2 / 3;">
        <div class="window-header"><span>Główny Monitor</span><span>LIVE_SIGNAL</span></div>
        <div id="player-container">
            <div id="player"></div>
        </div>
        <div class="controls">
            <div class="btn" onclick="player.playVideo()">URUCHOM</div>
            <div class="btn" onclick="player.pauseVideo()">WSTRZYMAJ</div>
            <div class="btn" onclick="player.mute()">WYCISZ</div>
        </div>
    </section>

    <section class="window">
        <div class="window-header"><span>Status</span><span>ID_099</span></div>
        <div style="padding: 20px; font-size: 12px;">
            <p><span class="status-dot"></span> Połączenie stabilne</p>
            <p>> CPU: 14%</p>
            <p>> RAM: 2.4GB / 8GB</p>
            <p>> USER: Maciek_Admin</p>
