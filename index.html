<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS-V | System Operacyjny</title>
    <style>
        :root { --glow: #58a6ff; --bg: #0d1117; --panel: #161b22; }
        body { background-color: var(--bg); color: #c9d1d9; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background-color: var(--panel); padding: 15px 30px; border-bottom: 2px solid var(--glow); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 0 20px rgba(88, 166, 255, 0.2); }
        h1 { margin: 0; font-size: 24px; letter-spacing: 4px; color: var(--glow); text-shadow: 0 0 10px var(--glow); }
        main { display: flex; flex: 1; padding: 20px; gap: 20px; }
        #side-panel { width: 300px; background: #010409; border: 1px solid #30363d; border-radius: 12px; display: flex; flex-direction: column; padding: 15px; }
        .video-list { flex: 1; overflow-y: auto; margin-bottom: 15px; }
        .video-btn { width: 100%; padding: 10px; margin-bottom: 8px; background: var(--panel); border: 1px solid #30363d; color: white; text-align: left; cursor: pointer; border-radius: 6px; font-size: 13px; }
        .video-btn:hover { background: var(--glow); color: black; font-weight: bold; }
        #display-core { flex: 1; background: #000; border: 1px solid #30363d; border-radius: 12px; display: flex; flex-direction: column; }
        iframe { flex: 1; width: 100%; border: none; border-radius: 12px 12px 0 0; }
        .info-bar { padding: 10px; background: var(--panel); font-family: monospace; font-size: 14px; text-align: center; border-radius: 0 0 12px 12px; color: var(--glow); }
        .add-zone { display: flex; flex-direction: column; gap: 5px; }
        input { background: #0d1117; border: 1px solid #30363d; color: white; padding: 8px; border-radius: 4px; }
        button.add-btn { background: #238636; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div>
        <h1>NEXUS-V</h1>
        <div style="font-size: 10px; color: #8b949e;">LOGOWANIE: ADMIN MACIEK | STATUS: ONLINE</div>
    </div>
    <div id="clock">TERMINAL SYSTEMOWY</div>
</header>

<main>
    <div id="side-panel">
        <h3 style="margin-top:0">LISTA ANALIZ</h3>
        <div class="video-list" id="videoList">
            <button class="video-btn" onclick="loadVideo('dQw4w9WgXcQ')"># PROTOKÓŁ STARTOWY</button>
        </div>
        <div class="add-zone">
            <input type="text" id="vId" placeholder="ID filmu z YouTube">
            <button class="add-btn" onclick="addNewVideo()">DODAJ TRANSMISJĘ</button>
        </div>
    </div>
    <div id="display-core">
        <iframe id="nexusPlayer" src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
        <div class="info-bar">AKTYWNY SYGNAŁ: <span id="vTitle">STARTUP_SEQUENCE</span></div>
    </div>
</main>

<script>
    function loadVideo(id) {
        document.getElementById('nexusPlayer').src = "https://www.youtube.com/embed/" + id;
        document.getElementById('vTitle').innerText = "STREAM_ID: " + id;
    }
    function addNewVideo() {
        let val = document.getElementById('vId').value;
        let id = val.includes('v=') ? val.split('v=')[1].split('&')[0] : val;
        if(id.trim() !== "") {
            let list = document.getElementById('videoList');
            let btn = document.createElement('button');
            btn.className = "video-btn";
            btn.innerText = "# TRANSMISJA: " + id;
            btn.onclick = function() { loadVideo(id); };
            list.prepend(btn);
            document.getElementById('vId').value = "";
        }
    }
</script>
</body>
</html>
