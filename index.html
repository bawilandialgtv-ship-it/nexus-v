<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; padding: 20px; border: 1px solid #00ff41; overflow: hidden; }
        .equalizer { display: flex; align-items: flex-end; height: 100px; gap: 5px; justify-content: center; margin-top: 50px; }
        .bar { width: 15px; background: #00ff41; animation: bounce 1s infinite ease-in-out; }
        @keyframes bounce { 0%, 100% { height: 10px; } 50% { height: 80px; } }
        .track-info { border: 1px solid #333; padding: 10px; margin-top: 20px; background: #050505; }
        .control-btn { border: 1px solid #00ff41; background: none; color: #00ff41; padding: 10px; cursor: pointer; margin: 5px; }
        .control-btn:hover { background: #00ff41; color: #000; }
    </style>
</head>
<body>
    <div style="text-align:center">
        <h2>DEKODER AUDIO NEXUS-V</h2>
        <div class="equalizer">
            <div class="bar" style="animation-delay: 0.1s"></div>
            <div class="bar" style="animation-delay: 0.3s"></div>
            <div class="bar" style="animation-delay: 0.2s"></div>
            <div class="bar" style="animation-delay: 0.4s"></div>
            <div class="bar" style="animation-delay: 0.1s"></div>
        </div>
        <div class="track-info">
            STREAMS STATUS: WAITING FOR DATA PACKETS...<br>
            BUFFERING: 100%
        </div>
        <div>
            <button class="control-btn">PLAY</button>
            <button class="control-btn">STOP</button>
            <button class="control-btn">SYNC</button>
        </div>
    </div>
</body>
</html>
