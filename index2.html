<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>NEXUS-V // CORE ENGINE</title>
    <style>
        body {
            background: #000;
            color: #00ff41;
            font-family: 'Consolas', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #nexus-interface {
            width: 600px;
            border: 1px solid #00ff41;
            padding: 20px;
            background: rgba(0, 10, 0, 0.9);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.2);
        }

        .display {
            background: #000;
            border: 1px solid #004400;
            height: 150px;
            margin-bottom: 20px;
            padding: 10px;
            font-size: 13px;
            overflow-y: auto;
            border-radius: 5px;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .btn {
            background: #000;
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 10px;
            cursor: pointer;
            text-align: center;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn:hover {
            background: #00ff41;
            color: #000;
        }

        .btn:active {
            transform: scale(0.95);
        }

        #playlist {
            margin-top: 20px;
            border-top: 1px solid #004400;
            padding-top: 10px;
            max-height: 200px;
            overflow-y: auto;
        }

        .track {
            padding: 8px;
            cursor: pointer;
            border-bottom: 1px solid #001100;
        }

        .track:hover {
            background: #002200;
        }

        .track.active {
            background: #00ff41;
            color: #000;
        }
    </style>
</head>
<body>

<div id="nexus-interface">
    <h1 style="text-align: center; font-size: 1.5em; margin-top: 0;">[ NEXUS-V // ANGELINA ]</h1>
    
    <div class="display" id="main-display">
        [SYSTEM] Angelina Kernel Loaded...<br>
        [SYSTEM] Czekam na polecenie SYNC...
    </div>

    <div class="controls">
        <div class="btn" onclick="NexusEngine.sync()">SYNC GITHUB</div>
        <div class="btn" onclick="NexusEngine.play()">PLAY TRACK</div>
        <div class="btn" onclick="NexusEngine.stop()">STOP</div>
    </div>

    <div id="playlist">
        </div>
</div>

<script>
    /**
     * LUDZKI KOD JAVASCRIPT - SILNIK NEXUS-V
     */
    const NexusEngine = {
        config: {
            user: 'bawilandialgtv-ship-it',
            token: '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'
        },
        data: [],
        currentIndex: -1,

        log(msg, type = 'SYSTEM') {
            const display = document.getElementById('main-display');
            display.innerHTML += `<div>[${type}] ${msg}</div>`;
            display.scrollTop = display.scrollHeight;
        },

        async sync() {
            this.log("Inicjalizacja połączenia z API...", "JS-CORE");
            
            try {
                const response = await fetch(`https://api.github.com/users/${this.config.user}/repos?sort=updated`, {
                    headers: { 'Authorization': `token ${this.config.token}` }
                });

                if (!response.ok) throw new Error("Błąd autoryzacji");

                this.data = await response.json();
                this.log(`Wczytano ${this.data.length} modułów danych.`, "SUCCESS");
                this.renderPlaylist();

            } catch (err) {
                this.log(err.message, "ERROR");
            }
        },

        renderPlaylist() {
            const container = document.getElementById('playlist');
            container.innerHTML = "";
            
            this.data.forEach((repo, index) => {
                const div = document.createElement('div');
                div.className = 'track';
                div.id = `track-${index}`;
                div.innerText = `MOD_ID: ${repo.name.toUpperCase()} (${repo.language || 'DATA'})`;
                div.onclick = () => this.selectTrack(index);
                container.appendChild(div);
            });
        },

        selectTrack(index) {
            // Czyścimy poprzedni aktywny
            if(this.currentIndex !== -1) {
                document.getElementById(`track-${this.currentIndex}`).classList.remove('active');
            }
            
            this.currentIndex = index;
            const track = this.data[index];
            document.getElementById(`track-${index}`).classList.add('active');
            this.log(`Załadowano moduł: ${track.name}`, "BUFFER");
        },

        play() {
            if(this.currentIndex === -1) {
                this.log("BŁĄD: Nie wybrano ścieżki!", "ERROR");
                return;
            }
            const track = this.data[this.currentIndex];
            this.log(`ODTWARZANIE: ${track.full_name}...`, "ACTIVE");
            this.log(`LINK: ${track.html_url}`, "URL");
        },

        stop() {
            this.log("System zatrzymany.", "CMD");
        }
    };

    // Powitanie Maciek!
    window.onload = () => {
        NexusEngine.log("Witaj, Maciek. System operacyjny Angelina gotowy.");
    };
</script>

</body>
</html>
